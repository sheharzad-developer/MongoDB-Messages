<!DOCTYPE html>
<html>
<head>
    <title>MongoDB Messages Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
    <h1>MongoDB Messages</h1>
    <div class="subtitle">Capture and review messages stored in your MongoDB collection.</div>

    <div class="form-row">
        <div class="form-field">
            <label for="nameMessage">Full Name</label>
            <input type="text" id="nameMessage" placeholder="Enter Full Name">
        </div>
        <div class="form-field">
            <label for="emailMessage">Email</label>
            <input type="text" id="emailMessage" placeholder="Enter Email">
        </div>
        <div class="form-field">
            <label for="phoneMessage">Phone</label>
            <input type="text" id="phoneMessage" placeholder="Enter Phone">
        </div>
        <div class="form-field">
            <label for="messageMessage">Message</label>
            <input type="text" id="messageMessage" placeholder="Enter Message">
        </div>
        <div class="form-field">
            <label for="addressInput">Address</label>
            <input type="text" id="addressInput" placeholder="Street / Address line">
        </div>
        <div class="form-field">
            <label>Gender</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="gender" value="male" id="genderMale"> Male</label>
                <label class="radio-label"><input type="radio" name="gender" value="female" id="genderFemale"> Female</label>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" id="saveBtn" onclick="saveOrUpdate()">Save record</button>
        <button class="btn btn-secondary" id="cancelEditBtn" style="display: none;" onclick="cancelEdit()">Cancel edit</button>
        <button class="btn btn-secondary" onclick="loadMessages()">Refresh Records</button>
    </div>
    <input type="hidden" id="editId" value="">

    <div class="table-card">
        <div class="table-header">
            <div class="table-header-title">Stored Records</div>   
            <div class="table-header-caption">Live view of documents in the <span class="pill">messages</span> collection. Click Refresh to load.</div>
        </div>
        <table id="messagesTable">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Message</th>
                    <th>Address</th>
                    <th>Gender</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="messagesBody">
            </tbody>
        </table>
    </div>
</div>

<script>
function getMessageId(item) {
    if (!item || item._id == null) return '';
    if (typeof item._id === 'string') return item._id;
    if (typeof item._id === 'object' && item._id.$oid) return item._id.$oid;
    return String(item._id);
}

function sendMessage() {
    const name = document.getElementById("nameMessage").value;
    const email = document.getElementById("emailMessage").value;
    const phone = document.getElementById("phoneMessage").value;
    const message = document.getElementById("messageMessage").value;
    const gender = getGenderValue();

    const address = document.getElementById("addressInput").value;
    fetch('/api/record', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, phone, message, address, gender })
    })
    .then(res => res.json())
    .then(data => {
        alert("Saved!");
    });
}

var TABLE_COLUMNS = ['name', 'email', 'phone', 'message', 'address', 'gender'];

function displayValue(item, key) {
    var v = item[key];
    if (v == null || v === '') return '\u00A0';
    if (key === 'gender') return v === 'male' ? 'Male' : v === 'female' ? 'Female' : v;
    return v;
}

function loadMessages() {
    fetch('/api/records')
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
        var tbody = document.getElementById("messagesBody");
        tbody.innerHTML = "";
        if (!result.ok) {
            tbody.innerHTML = '<tr><td colspan="7" style="color:#ef4444;">Failed to load records.</td></tr>';
            return;
        }
        var data = result.data;
        if (!Array.isArray(data)) {
            tbody.innerHTML = '<tr><td colspan="7" style="color:#ef4444;">Invalid response.</td></tr>';
            return;
        }
        data.forEach(function(item) {
            var tr = document.createElement("tr");
            TABLE_COLUMNS.forEach(function(key) {
                var td = document.createElement("td");
                td.textContent = displayValue(item, key);
                tr.appendChild(td);
            });
            var tdActions = document.createElement("td");
            var editBtn = document.createElement("button");
            editBtn.className = "btn btn-secondary";
            editBtn.textContent = "Edit";
            editBtn.onclick = function() { editMessage(item); };
            var delBtn = document.createElement("button");
            delBtn.className = "btn btn-secondary";
            delBtn.textContent = "Delete";
            delBtn.onclick = function() { deleteMessage(getMessageId(item)); };
            tdActions.appendChild(editBtn);
            tdActions.appendChild(delBtn);
            tr.appendChild(tdActions);
            tbody.appendChild(tr);
        });
    })
    .catch(function(err) {
        var tbody = document.getElementById("messagesBody");
        tbody.innerHTML = '<tr><td colspan="7" style="color:#ef4444;">Could not load records. Is the server running?</td></tr>';
    });
}

function getGenderValue() {
    const male = document.getElementById("genderMale");
    const female = document.getElementById("genderFemale");
    if (male && male.checked) return 'male';
    if (female && female.checked) return 'female';
    return '';
}

function setGenderValue(value) {
    const male = document.getElementById("genderMale");
    const female = document.getElementById("genderFemale");
    if (male) male.checked = (value === 'male');
    if (female) female.checked = (value === 'female');
}

function editMessage(item) {
    document.getElementById("nameMessage").value = item.name || '';
    document.getElementById("emailMessage").value = item.email || '';
    document.getElementById("phoneMessage").value = item.phone || '';
    document.getElementById("messageMessage").value = item.message || '';
    document.getElementById("addressInput").value = item.address || '';
    setGenderValue(item.gender || '');
    document.getElementById("editId").value = getMessageId(item);
    document.getElementById("saveBtn").textContent = "Update";
    document.getElementById("cancelEditBtn").style.display = "inline-flex";
}

function cancelEdit() {
    document.getElementById("editId").value = '';
    document.getElementById("saveBtn").textContent = "Save record";
    document.getElementById("cancelEditBtn").style.display = "none";
    document.getElementById("nameMessage").value = '';
    document.getElementById("emailMessage").value = '';
    document.getElementById("phoneMessage").value = '';
    document.getElementById("messageMessage").value = '';
    document.getElementById("addressInput").value = '';
    setGenderValue('');
}

function saveOrUpdate() {
    const editId = document.getElementById("editId").value;
    const name = document.getElementById("nameMessage").value;
    const email = document.getElementById("emailMessage").value;
    const phone = document.getElementById("phoneMessage").value;
    const message = document.getElementById("messageMessage").value;
    const address = document.getElementById("addressInput").value;
    const gender = getGenderValue();
    const payload = { name, email, phone, message, address, gender };

    if (editId) {
        fetch('/api/record/' + encodeURIComponent(editId), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json().then(data => ({ ok: res.ok, data })))
        .then(({ ok, data }) => {
            if (ok && data.success) {
                alert("Updated!");
                cancelEdit();
                loadMessages();
            } else {
                alert(data.error || "Update failed");
            }
        })
        .catch(() => alert("Update failed"));
    } else {
        fetch('/api/record', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            alert("Saved!");
            loadMessages();
        });
    }
}

function deleteMessage(id) {
    if (!confirm("Delete this record?")) return;
    fetch('/api/record/' + encodeURIComponent(id), { method: 'DELETE' })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            loadMessages();
        } else alert(data.error || "Delete failed");
    });
}
</script>

</body>
</html>
